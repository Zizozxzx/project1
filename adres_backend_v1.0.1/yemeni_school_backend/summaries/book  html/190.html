<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>غلاف الوحدة</title>

<style>
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  font-family:"Amiri","Arial",sans-serif;
}

.page{
  min-height:100vh;
  background:linear-gradient(135deg,#dff3e6 0%,#ffffff 45%,#cfeeff 100%);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:space-between;
  padding:20px 10px 30px;
  box-sizing:border-box;
}

/* الشعار العلوي */
.logo-top{
  margin-top:10px;
}

/* الرسم الرئيسي */
.main-figure{
  width:100%;
  max-width:420px;
}

/* الشعار السفلي */
.seal{
  margin:20px 0 10px;
}

/* الرابط */
.site{
  color:#1aa6df;
  font-size:18px;
  text-align:center;
}
</style>
</head>

<body>
<div class="page">

  <!-- شعار قطرة الماء (مرسوم) -->
  <div class="logo-top">
    <svg viewBox="0 0 220 260" width="160">
      <!-- قطرة -->
      <path d="M110 10
               C160 80 200 130 200 180
               C200 225 160 250 110 250
               C60 250 20 225 20 180
               C20 130 60 80 110 10Z"
            fill="#8fc9ee" stroke="#4b6f8a" stroke-width="2"/>
      <!-- منظر داخلي -->
      <ellipse cx="110" cy="160" rx="70" ry="35" fill="#6fb7e9"/>
      <line x1="40" y1="160" x2="180" y2="160" stroke="#ffffff" stroke-width="2"/>
      <!-- قلب -->
      <path d="M130 170
               c0-8 12-8 12 0
               c0 8-12 14-12 18
               c0-4-12-10-12-18
               c0-8 12-8 12 0z"
            fill="#e44"/>
      <!-- كتابة -->
      <text x="110" y="230" text-anchor="middle" font-size="16" fill="#000">
        وَجَعَلْنَا مِنَ الْمَاءِ كُلَّ شَيْءٍ حَيٍّ
      </text>
    </svg>
  </div>

  <!-- الرسم الهندسي (مبنى + سلم) -->
  <div class="main-figure">
    <svg viewBox="0 0 420 260" width="100%">
      <!-- الأرض -->
      <rect x="0" y="190" width="420" height="70" fill="#9fd8ea"/>

      <!-- المبنى -->
      <rect x="200" y="60" width="160" height="130"
            fill="none" stroke="#000" stroke-width="2"/>
      <!-- السقف -->
      <polygon points="200,60 260,30 420,30 360,60"
               fill="none" stroke="#000" stroke-width="2"/>

      <!-- النوافذ -->
      <g stroke="#000" stroke-width="1.5" fill="none">
        <g transform="translate(220,80)">
          <rect width="24" height="30"/>
          <path d="M0 10 h24"/>
        </g>
        <g transform="translate(260,80)">
          <rect width="24" height="30"/>
          <path d="M0 10 h24"/>
        </g>
        <g transform="translate(300,80)">
          <rect width="24" height="30"/>
          <path d="M0 10 h24"/>
        </g>

        <g transform="translate(220,120)">
          <rect width="24" height="30"/>
          <path d="M0 10 h24"/>
        </g>
        <g transform="translate(260,120)">
          <rect width="24" height="30"/>
          <path d="M0 10 h24"/>
        </g>
        <g transform="translate(300,120)">
          <rect width="24" height="30"/>
          <path d="M0 10 h24"/>
        </g>

        <g transform="translate(220,160)">
          <rect width="24" height="30"/>
          <path d="M0 10 h24"/>
        </g>
        <g transform="translate(260,160)">
          <rect width="24" height="30"/>
          <path d="M0 10 h24"/>
        </g>
        <g transform="translate(300,160)">
          <rect width="24" height="30"/>
          <path d="M0 10 h24"/>
        </g>
      </g>

      <!-- السلم -->
      <line x1="80" y1="190" x2="240" y2="70"
            stroke="#000" stroke-width="2"/>
      <line x1="95" y1="190" x2="255" y2="70"
            stroke="#000" stroke-width="2"/>

      <!-- درجات السلم -->
      <g stroke="#000" stroke-width="1.2">
        <line x1="100" y1="180" x2="112" y2="170"/>
        <line x1="118" y1="166" x2="130" y2="156"/>
        <line x1="136" y1="152" x2="148" y2="142"/>
        <line x1="154" y1="138" x2="166" y2="128"/>
        <line x1="172" y1="124" x2="184" y2="114"/>
        <line x1="190" y1="110" x2="202" y2="100"/>
        <line x1="208" y1="96" x2="220" y2="86"/>
      </g>

      <!-- قاعدة السلم -->
      <polygon points="40,190 80,190 120,190 80,220"
               fill="none" stroke="#000" stroke-width="2"/>
    </svg>
  </div>

  <!-- ختم الوزارة (مرسوم) -->
  <div class="seal">
    <svg viewBox="0 0 120 120" width="90">
      <circle cx="60" cy="60" r="55" fill="none" stroke="#000" stroke-width="2"/>
      <circle cx="60" cy="60" r="45" fill="none" stroke="#000" stroke-width="1.5"/>
      <text x="60" y="55" text-anchor="middle" font-size="10">الجمهورية اليمنية</text>
      <text x="60" y="70" text-anchor="middle" font-size="10">وزارة التربية والتعليم</text>
    </svg>
  </div>

  <!-- الرابط -->
  <div class="site">
    http://www.e-learning-moe.edu.ye/
  </div>

</div>
</body>
</html>
