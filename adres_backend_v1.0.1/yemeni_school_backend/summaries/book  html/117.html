<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التمثيل البياني – ص = س − ٥</title>

<style>
body{
    margin:0;
    background:#fff;
    font-family:"Segoe UI", Arial, sans-serif;
}
.page{
    max-width:900px;
    margin:auto;
    padding:20px 50px 160px 50px;
    position:relative;
}

/* الخط العلوي */
.top-line{
    height:4px;
    background:#00a0df;
    margin-bottom:10px;
}
.top-title{
    font-size:16px;
    text-align:right;
    margin-bottom:15px;
}

/* النص */
.text{
    font-size:20px;
    line-height:2.6;
    margin-bottom:15px;
}

/* الجدول */
.table-box{
    border:2px solid #000;
    background:#dff3ff;
    margin:20px 0;
}
.table-title{
    text-align:center;
    font-size:22px;
    padding:10px;
    border-bottom:2px solid #000;
}
table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
}
th, td{
    border:2px solid #000;
    padding:12px;
    text-align:center;
    font-size:20px;
}
th{
    background:#dff3ff;
}

/* الرسم */
.graph-container{
    margin:30px auto;
    width:100%;
    max-width:800px;
}

/* التذييل */
.footer-line{
    position:absolute;
    bottom:40px;
    right:50px;
    left:50px;
    height:4px;
    background:#00a0df;
}
.page-number{
    position:absolute;
    bottom:15px;
    left:50px;
    width:60px;
    height:60px;
    border:3px solid #00a0df;
    border-radius:50%;
    text-align:center;
    line-height:54px;
    font-size:22px;
    font-weight:bold;
}
.footer-link{
    position:absolute;
    bottom:-35px;
    left:50%;
    transform:translateX(-50%);
    color:#1a5fb4;
    font-size:18px;
}
</style>
</head>

<body>
<div class="page">

<div class="top-line"></div>
<div class="top-title">الوحدة الثالثة</div>

<div class="text">
ننشئ جدول القيم ، على النحو التالي :
</div>

<div class="table-box">
    <div class="table-title">ص = س − ٥</div>
    <table>
        <thead>
            <tr>
                <th>س</th>
                <th>ص</th>
                <th>( س ، ص )</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>−٢</td>
                <td>−٧</td>
                <td>( −٢ ، −٧ )</td>
            </tr>
            <tr>
                <td>٣</td>
                <td>−٢</td>
                <td>( ٣ ، −٢ )</td>
            </tr>
            <tr>
                <td>٠</td>
                <td>−٥</td>
                <td>( ٠ ، −٥ )</td>
            </tr>
        </tbody>
    </table>
</div>

<div class="text">
نمثل النقاط ( −٢ ، −٧ ) ، ( ٣ ، −٢ ) ، ( ٠ ، −٥ ) في المستوى ح × ح
ونرسم المستقيم كما في الشكل ( ٣ − ٢ ) .
</div>

<!-- الرسم البياني المرسوم يدويًا -->
<div class="graph-container">
<svg viewBox="0 0 700 700" width="100%" height="700">

<!-- شبكة -->
<g stroke="#ccc" stroke-width="1">
    <!-- عمودي -->
    <line x1="100" y1="0" x2="100" y2="700"/>
    <line x1="200" y1="0" x2="200" y2="700"/>
    <line x1="300" y1="0" x2="300" y2="700"/>
    <line x1="400" y1="0" x2="400" y2="700"/>
    <line x1="500" y1="0" x2="500" y2="700"/>
    <line x1="600" y1="0" x2="600" y2="700"/>

    <!-- أفقي -->
    <line x1="0" y1="100" x2="700" y2="100"/>
    <line x1="0" y1="200" x2="700" y2="200"/>
    <line x1="0" y1="300" x2="700" y2="300"/>
    <line x1="0" y1="400" x2="700" y2="400"/>
    <line x1="0" y1="500" x2="700" y2="500"/>
    <line x1="0" y1="600" x2="700" y2="600"/>
</g>

<!-- المحاور -->
<line x1="350" y1="0" x2="350" y2="700" stroke="#000" stroke-width="3"/>
<line x1="0" y1="350" x2="700" y2="350" stroke="#000" stroke-width="3"/>

<!-- الأسهم -->
<polygon points="350,0 340,20 360,20" fill="#000"/>
<polygon points="700,350 680,340 680,360" fill="#000"/>
<polygon points="350,700 340,680 360,680" fill="#000"/>
<polygon points="0,350 20,340 20,360" fill="#000"/>

<!-- أسماء المحاور -->
<text x="360" y="25" font-size="20">ص</text>
<text x="670" y="340" font-size="20">س</text>

<!-- الخط ص = س - 5 -->
<line x1="150" y1="550" x2="650" y2="50"
      stroke="#00a0df" stroke-width="5"/>

<!-- النقاط -->
<circle cx="250" cy="550" r="7" fill="#00a0df"/>
<circle cx="500" cy="300" r="7" fill="#00a0df"/>
<circle cx="350" cy="450" r="7" fill="#00a0df"/>

<!-- التسميات -->
<text x="230" y="570">(−٢ ، −٧)</text>
<text x="510" y="290">(٣ ، −٢)</text>
<text x="360" y="470">(٠ ، −٥)</text>

</svg>
</div>

<div class="footer-line"></div>
<div class="page-number">١٢٠</div>
<div class="footer-link">http://www.e-learning-moe.edu.ye/</div>

</div>
</body>
</html>
